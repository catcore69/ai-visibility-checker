<!-- ===== ОБЛОЖКА ===== -->
<div class="cover">
  <div class="cover-logo">
    <svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.2)"/>
      <text x="9" y="22" font-family="Arial" font-size="18" font-weight="900" fill="white">C</text>
      <text x="40" y="22" font-family="Arial" font-size="14" font-weight="700" fill="white">Cat Core</text>
      <text x="40" y="30" font-family="Arial" font-size="8" font-weight="400" fill="rgba(255,255,255,0.7)">GEO Studio</text>
    </svg>
  </div>

  <div class="cover-score-ring">
    <span class="cover-score-num">{{ visibility_score }}</span>
    <span class="cover-score-sub">/ 100</span>
  </div>

  <h1 class="cover-brand">{{ brand_name }}</h1>
  <p class="cover-subtitle">AI Visibility Report &mdash; насколько вас знают ИИ-ассистенты</p>

  <p class="cover-date">Дата формирования: {{ report_date }}</p>
</div>
