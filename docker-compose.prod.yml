version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"   # доступен только с localhost хоста
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: always
    env_file: .env
    network_mode: host          # видит 192.168.0.4 и redis на 127.0.0.1
    depends_on:
      - redis
    volumes:
      - ./backend/credentials:/app/credentials:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: ./backend
    restart: always
    env_file: .env
    network_mode: host
    depends_on:
      - redis
    volumes:
      - ./backend/credentials:/app/credentials:ro
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 --queues=reports

  beat:
    build:
      context: ./backend
    restart: always
    env_file: .env
    network_mode: host
    depends_on:
      - redis
    command: celery -A app.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:alpine
    network_mode: host
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend

volumes:
  redis_data:
